<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        secondary: '#ec4899',
                        dark: '#0f172a',
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'float-delayed': 'float 8s ease-in-out infinite reverse',
                        'blob': 'blob 7s infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.5, 0, 0, 1);
        }
        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        .cursor-blink {
            border-right: 3px solid #6366f1;
            animation: blink 0.75s step-end infinite;
        }
        @keyframes blink {
            50% { border-color: transparent; }
        }
        
        .skill-bar-fill {
            width: 0;
            transition: width 1.5s ease-out;
        }
        .skill-bar-fill.visible {
            width: var(--width);
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
        }
        .dark .glass {
            background: rgba(15, 23, 42, 0.7);
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #6366f1, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-dark text-gray-900 dark:text-white transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel">

        // ==================== DATA ====================

            { name: 'Node.js & Express', level: 88, icon: '🟢', desc: 'Backend & API development' },
            { name: 'Tailwind & UI/UX', level: 92, icon: '🎨', desc: 'Design system & prototyping' },
            { name: 'Database & DevOps', level: 85, icon: '🗄️', desc: 'PostgreSQL, Docker, AWS' },
        ];

        const PROJECTS = [
            {
                title: 'SaaS Dashboard',
                desc: 'Dashboard analytics real-time dengan visualisasi data interaktif menggunakan D3.js dan WebSocket.',
                tags: ['React', 'TypeScript', 'D3.js'],
                gradient: 'from-violet-500 to-purple-600',
                icon: '📊'
            },
            {
                title: 'E-Commerce API',
                desc: 'REST API skala besar dengan microservices, payment gateway, dan sistem inventory otomatis.',
                tags: ['Node.js', 'PostgreSQL', 'Redis'],
                gradient: 'from-pink-500 to-rose-500',
                icon: '🛒'

            {
                title: 'Mobile App Travel',
                desc: 'Aplikasi iOS & Android untuk booking perjalanan dengan AI recommendation engine.',
                tags: ['React Native', 'Firebase', 'TensorFlow'],
                gradient: 'from-blue-400 to-cyan-400',
                icon: '✈️'
            },
            {
                title: 'AI Content Generator',
                desc: 'Platform AI untuk generate konten marketing dengan fine-tuned language model.',
                tags: ['Python', 'FastAPI', 'OpenAI'],
                gradient: 'from-emerald-400 to-teal-500',
                icon: '🤖'
            },

        const NAV_LINKS = [
            { name: 'Beranda', href: '#home' },
            { name: 'Tentang', href: '#about' },
            { name: 'Keahlian', href: '#skills' },
            { name: 'Proyek', href: '#projects' },
            { name: 'Kontak', href: '#contact' },

        // ==================== HOOKS ====================
        function useTypingEffect(words, speed = 120, deleteSpeed = 80, pause = 2000) {
            const [text, setText] = useState('');
            const [isDeleting, setIsDeleting] = useState(false);
            const [wordIndex, setWordIndex] = useState(0);
            const [showCursor, setShowCursor] = useState(true);

            useEffect(() => {
                const currentWord = words[wordIndex];
                let timer;

                if (!isDeleting && text === currentWord) {
                    timer = setTimeout(() => setIsDeleting(true), pause);
                } else if (isDeleting && text === '') {
                    setIsDeleting(false);
                    setWordIndex((prev) => (prev + 1) % words.length);
                } else {
                    const nextText = isDeleting 
                        ? currentWord.substring(0, text.length - 1)
                        : currentWord.substring(0, text.length + 1);
                    timer = setTimeout(() => setText(nextText), isDeleting ? deleteSpeed : speed);
                }

                return () => clearTimeout(timer);
            }, [text, isDeleting, wordIndex, words, speed, deleteSpeed, pause]);

            useEffect(() => {
                const cursorTimer = setInterval(() => setShowCursor(p => !p), 530);
                return () => clearInterval(cursorTimer);
            }, []);

            return { text, showCursor };
        }

        function useScrollReveal() {
            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('visible');
                            // Trigger skill bars
                            const bars = entry.target.querySelectorAll('.skill-bar-fill');
                            bars.forEach(bar => bar.classList.add('visible'));
                        }
                    });
                }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

                document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
                return () => observer.disconnect();
            }, []);
        }

        // ==================== COMPONENTS ====================
        function Navbar({ darkMode, setDarkMode }) {
            const [isOpen, setIsOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <nav className={`fixed w-full top-0 z-50 transition-all duration-300 ${
                    scrolled ? 'glass shadow-lg border-b border-gray-200 dark:border-gray-800' : ''
                }`}>
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex justify-between items-center h-16">
                            <div className="text-2xl font-bold gradient-text tracking-tight">
                                Portofolio.
                            </div>

                            <div className="hidden md:flex items-center gap-8">
                                {NAV_LINKS.map(link => (
                                    <a key={link.name} href={link.href} 
                                       className="text-sm font-medium text-gray-600 dark:text-gray-300 hover:text-primary dark:hover:text-primary transition-colors relative group">
                                        {link.name}
                                        <span className="absolute -bottom-1 left-0 w-0 h-0.5 bg-primary transition-all group-hover:w-full"></span>
                                    </a>
                                ))}
                                <button 
                                    onClick={() => setDarkMode(!darkMode)}
                                    className="p-2 rounded-xl bg-gray-100 dark:bg-gray-800 hover:scale-110 transition-transform"
                                >
                                    {darkMode ? '☀️' : '🌙'}
                                </button>
                            </div>

                            <button className="md:hidden p-2 space-y-1.5" onClick={() => setIsOpen(!isOpen)}>
                                <span className={`block w-6 h-0.5 bg-current transition-transform ${isOpen ? 'rotate-45 translate-y-2' : ''}`}></span>
                                <span className={`block w-6 h-0.5 bg-current transition-opacity ${isOpen ? 'opacity-0' : ''}`}></span>
                                <span className={`block w-6 h-0.5 bg-current transition-transform ${isOpen ? '-rotate-45 -translate-y-2' : ''}`}></span>
                            </button>
                        </div>
                    </div>

                    {isOpen && (
                        <div className="md:hidden glass border-t border-gray-200 dark:border-gray-800">
                            {NAV_LINKS.map(link => (
                                <a key={link.name} href={link.href}

                                    {link.name}
                                </a>
                            ))}
                            <div className="px-4 py-3">
                                <button 
                                    onClick={() => setDarkMode(!darkMode)}
                                    className="flex items-center gap-2 text-gray-700 dark:text-gray-300"
                                >
                                    {darkMode ? '☀️ Mode Terang' : '🌙 Mode Gelap'}
                                </button>
                            </div>
                        </div>
                    )}
                </nav>
            );
        }

                        <p className="text-lg md:text-xl text-gray-600 dark:text-gray-400 max-w-2xl mx-auto mb-10 reveal">

                            </div>
                            <div className="w-px h-12 bg-gray-300 dark:bg-gray-700"></div>
                            <div className="text-center">

                                <div className="text-sm">Klien</div>
                            </div>
                            <div className="w-px h-12 bg-gray-300 dark:bg-gray-700"></div>
                            <div className="text-center">
                                <div className="text-3xl font-bold text-gray-900 dark:text-white">3+</div>
                                <div className="text-sm">Tahun</div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        }

        function About() {
            return (
                <section id="about" className="py-24">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="grid md:grid-cols-2 gap-12 items-center">
                            <div className="reveal">
                                <div className="relative">
                                    <div className="w-full aspect-square rounded-3xl bg-gradient-to-br from-primary to-secondary flex items-center justify-center text-white text-8xl font-bold shadow-2xl shadow-primary/30">
                                        JD
                                    </div>

                                <h3 className="text-3xl md:text-4xl font-bold mb-6">Mari Berkolaborasi</h3>
                                <p className="text-gray-600 dark:text-gray-400 mb-8">
                                    Punya ide proyek menarik? Saya selalu terbuka untuk diskusi, kolaborasi, atau sekadar ngobrol tentang teknologi.
                                </p>

                                <div className="space-y-6">
                                    {[
                                        { icon: '📧', title: 'Email', val: 'hello@portofolio.com' },
                                        { icon: '📱', title: 'Telepon', val: '+62 812 3456 7890' },

                                            </div>

                                                className="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 focus:outline-none focus:ring-2 focus:ring-primary/50 transition-all resize-y"></textarea>
                                        </div>
                                        <button type="submit" 
                                            className="w-full py-3.5 rounded-xl bg-gradient-to-r from-primary to-secondary text-white font-semibold hover:shadow-lg hover:shadow-primary/30 hover:scale-[1.02] transition-all">
                                            Kirim Pesan 🚀
                                        </button>
                                        {formStatus && (
                                            <div className="text-center text-sm font-semibold text-green-600 dark:text-green-400 animate-pulse">
                                                {formStatus}

        function Footer() {
            return (
                <footer className="py-12 bg-dark text-white">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
                        <div className="text-2xl font-bold gradient-text mb-4">Portofolio.</div>
                        <div className="flex justify-center gap-6 mb-8">
                            {['GitHub', 'LinkedIn', 'Twitter', 'Instagram'].map(social => (
                                <a key={social} href="#" className="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center hover:bg-primary transition-colors text-sm font-bold">
                                    {social[0]}
                                </a>
                            ))}
                        </div>
                        <p className="text-gray-400 text-sm"> Dibuat dengan React & Tailwind. Semua hak dilindungi.</p>
                    </div>
                </footer>
            );
        }

        function App() {
            const [darkMode, setDarkMode] = useState(false);
            
            useEffect(() => {
                if (darkMode) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }, [darkMode]);

            useScrollReveal();

            return (
                <div className="min-h-screen">
                    <Navbar darkMode={darkMode} setDarkMode={setDarkMode} />
                    <Hero />
                    <About />
                    <Skills />
                    <Projects />
                    <Contact />
                    <Footer />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
